# CodeQL static analysis for Rust: every PR, plus a weekly sweep so new
# queries catch old code. Actions pinned to full commit SHAs.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (rust)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # codeql-bundle-v2.26.1
        with:
          languages: rust
          build-mode: none
      - uses: github/codeql-action/analyze@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # codeql-bundle-v2.26.1
        with:
          category: "/language:rust"
