# Release automation: pushing a v* tag builds binaries for four targets,
# smoke-tests each one, and publishes a GitHub Release with SHA-256
# checksums. Actions pinned to full commit SHAs; only the publish job
# holds a write token.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Smoke test
        # Every target runs natively on its runner (x86_64-apple-darwin
        # via Rosetta 2 on the arm64 macOS runner).
        run: ./target/${{ matrix.target }}/release/incant --version

      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="incant-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/incant" "$name/"
          cp README.md LICENSE CHANGELOG.md config.example.toml "$name/"
          tar -czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.target }}
          path: |
            incant-*.tar.gz
            incant-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Collect checksums
        run: |
          cd dist
          cat ./*.sha256 > SHA256SUMS
          rm ./*.sha256
          cat SHA256SUMS

      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
