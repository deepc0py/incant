# Continuous integration: every PR and push to main must build cleanly,
# pass tests on Linux, macOS, and Windows, satisfy clippy/rustfmt, and keep
# the dependency tree free of known advisories and license surprises.
#
# All third-party actions are pinned to full commit SHAs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual runs keep the Windows lane reproducible against local VM checks.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --all-targets --locked -- -D warnings

  # Separate job (not a matrix on `clippy`) so the existing required
  # status-check context "clippy" keeps its name. Lints the
  # cfg(windows) code paths, which never compile on the Linux lane.
  clippy-windows:
    name: clippy (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --all-targets --locked -- -D warnings

  # Proves the ARM64 MSVC linker/SDK setup on the x64 Windows runner
  # before a release tag depends on it. A debug build is enough to
  # surface missing target libs; release is exercised on tag.
  build-windows-arm64:
    name: build (aarch64-pc-windows-msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --locked --target aarch64-pc-windows-msvc

  # Runs the Windows installer's Pester suite under pwsh 7.4+. The suite
  # lands with the installer branch; until it merges this job fails,
  # matching the dependency already accepted for the Windows test lane.
  # windows-latest ships Pester 5; a missing module is a hard failure,
  # never an unpinned install from the gallery.
  pester-windows:
    name: pester (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run installer Pester suite
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion -lt [version] '7.4') {
              throw "pwsh 7.4+ required; runner has $($PSVersionTable.PSVersion)."
          }
          $pester = Get-Module -ListAvailable -Name Pester |
              Where-Object { $_.Version -ge [version] '5.0' } |
              Sort-Object -Property Version -Descending |
              Select-Object -First 1
          if ($null -eq $pester) {
              throw 'Pester 5 is not available on this runner; refusing to install an unpinned fallback.'
          }
          Import-Module Pester -MinimumVersion 5.0
          $result = Invoke-Pester -Path tests/install.Tests.ps1 -Output Detailed -PassThru
          if ($result.TotalCount -eq 0) {
              throw 'Pester discovered no tests in tests/install.Tests.ps1.'
          }
          if ($result.FailedCount -ne 0) {
              throw "Pester: $($result.FailedCount) of $($result.TotalCount) tests failed."
          }

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - if: matrix.os != 'windows-latest'
        run: cargo test --locked
      - if: matrix.os == 'windows-latest'
        name: Run Windows unit tests
        run: cargo test --locked --bin incant
        timeout-minutes: 5
      - if: matrix.os == 'windows-latest'
        name: Run Windows daemon integration
        run: cargo test --locked --test windows_daemon_integration -- --nocapture --test-threads=1
        timeout-minutes: 5

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
