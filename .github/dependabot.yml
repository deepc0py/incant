# Automated dependency updates. Cargo updates are grouped to keep PR
# noise low; GitHub Actions bumps arrive individually since they are
# rare and security-relevant (SHA pins move).

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
